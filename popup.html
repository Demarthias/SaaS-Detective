<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaaS Detective</title>
  <style>
    :root { --bg: #0f172a; --card: #ffffff; --text: #0f172a; --muted: #6b7280; --accent: #2563eb; }
    body { width: 360px; font-family: -apple-system, system-ui, sans-serif; padding: 0; margin: 0; background: #f8fafc; color: var(--text); }
    .header { background: var(--bg); color: #fff; padding: 14px 16px; text-align: left; }
    .header h1 { margin: 0; font-size: 16px; font-weight: 700; }
    .header p { margin: 4px 0 0; font-size: 12px; opacity: 0.8; }
    #status { margin: 8px 16px 0; font-size: 12px; color: var(--muted); }
    #status.error { color: #b91c1c; }

    #results { padding: 12px 16px 8px; min-height: 120px; }
    .card { background: var(--card); border: 1px solid #e5e7eb; padding: 10px 12px; margin-bottom: 8px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    .card h4 { margin: 0; font-size: 14px; color: #111827; }
    .category { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .visit-btn { background: var(--accent); color: #fff; border: none; padding: 6px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: 600; }
    .visit-btn:hover { background: #1d4ed8; }
    .empty { text-align: center; color: var(--muted); font-size: 13px; margin-top: 18px; }
    .upgrade-banner { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 8px; padding: 12px; margin-top: 4px; text-align: center; }
    .upgrade-count { font-size: 13px; font-weight: 700; color: #1e40af; }
    .upgrade-sub { font-size: 11px; color: #3b82f6; margin: 3px 0 8px; }
    .upgrade-btn { background: #2563eb; color: #fff; border: none; padding: 8px 14px; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; width: 100%; }
    .upgrade-btn:hover { background: #1d4ed8; }

    .footer { padding: 10px 12px 12px; text-align: center; font-size: 11px; color: #94a3b8; border-top: 1px solid #e5e7eb; background: #fff; }
    .footer a { color: #2563eb; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <h1>SaaS Detective</h1>
    <p>Scanning current site...</p>
  </div>

  <div id="status"></div>
  <div id="results">
    <div class="empty">Initializing...</div>
  </div>

  <div class="footer">
    Powered by Venom Industries LLC
    <div title="We may earn a commission from partner links." style="cursor: help; margin-top: 4px;">ⓘ Affiliate Disclosure</div>
    <div style="margin-top: 6px;">
      <a href="#" id="onboardingLink">How it works</a> ·
      <a href="#" id="optionsLink">Options</a> ·
      <a href="privacy.html" target="_blank">Privacy</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
